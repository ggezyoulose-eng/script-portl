<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roblox Tools</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0a0a10;--bg2:#13131c;--bg3:#1a1a26;--bg4:#222230;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#eeeef5;--text2:#7878a0;--text3:#44445a;
  --blue:#5b8af5;--purple:#8b5cf6;--green:#3dd68c;--red:#f7614f;--orange:#f7a94f;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(91,138,245,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,16,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;
  display:flex;align-items:center;gap:0;
}
.nav-logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:28px;white-space:nowrap;}
.nav-tabs{display:flex;gap:0;flex:1;overflow-x:auto;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{
  padding:0 16px;height:56px;display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.nav-tab-num{width:18px;height:18px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);}
.nav-tab.active .nav-tab-num{background:rgba(91,138,245,.15);color:var(--blue);}

/* ── PAGES ── */
.page{display:none;position:relative;z-index:1;}
.page.active{display:flex;flex-direction:column;}
.page-height{height:calc(100dvh - 56px);}

/* ═══════════════════════
   PAGE 1 — AI SCRIPT
═══════════════════════ */
#page1{height:calc(100dvh - 56px);}
.chat-wrap{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto;width:100%;}

.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

/* welcome */
.welcome{margin:auto;text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.welcome-icon{font-size:48px;}
.welcome-title{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.welcome-sub{font-size:13px;color:var(--text2);max-width:340px;line-height:1.6;}
.examples{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.ex-btn{padding:7px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;}
.ex-btn:hover{border-color:var(--blue);color:var(--blue);}
.ex-btn:active{transform:scale(.95);}

/* messages */
.msg-row{display:flex;gap:9px;align-items:flex-start;}
.msg-row.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.av.bot{background:linear-gradient(135deg,var(--blue),var(--purple));}
.av.user{background:var(--bg3);border:1px solid var(--border2);}
.msg-body{max-width:86%;}
.msg-row.user .msg-body{display:flex;justify-content:flex-end;}

.bubble{padding:10px 13px;border-radius:13px;font-size:14px;line-height:1.55;word-break:break-word;}
.bubble.bot{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text);}
.bubble.user{background:var(--blue);color:#fff;border-top-right-radius:4px;}

/* code block */
.code-wrap{margin-top:4px;background:var(--bg);border:1px solid var(--border2);border-radius:12px;overflow:hidden;width:100%;}
.code-head{padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.code-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;display:flex;align-items:center;gap:5px;}
.code-label span{width:7px;height:7px;border-radius:50%;background:var(--green);}
.cp-btn{padding:4px 10px;border-radius:6px;border:none;background:rgba(91,138,245,.12);color:var(--blue);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.cp-btn:hover{background:rgba(91,138,245,.22);}
.cp-btn:active{transform:scale(.92);}
pre.code-body{padding:13px;font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.7;overflow-x:auto;white-space:pre;max-height:380px;overflow-y:auto;}
pre.code-body::-webkit-scrollbar{height:3px;width:3px;}
pre.code-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

/* syntax */
.cm{color:#55607a;font-style:italic;}
.ck{color:#cc99cd;}
.cs{color:#7ec699;}
.cn{color:#f08d49;}
.cf{color:#6fb3d2;}

/* ── GENERATING SCREEN ── */
#genScreen{
  position:absolute;inset:0;background:var(--bg);z-index:50;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;
}
#genScreen.show{display:flex;}
.gen-orb{
  width:80px;height:80px;border-radius:50%;position:relative;
  background:linear-gradient(135deg,rgba(91,138,245,.2),rgba(139,92,246,.2));
  display:flex;align-items:center;justify-content:center;font-size:36px;
}
.gen-orb::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--blue),var(--purple),var(--blue));
  animation:orbSpin 1.5s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 2px));
}
@keyframes orbSpin{to{transform:rotate(360deg);}}
.gen-title{font-size:18px;font-weight:700;color:var(--text);}
.gen-sub{font-size:13px;color:var(--text2);}
.gen-dots{display:flex;gap:6px;}
.gen-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);opacity:.3;animation:gd 1.2s infinite;}
.gen-dot:nth-child(2){animation-delay:.2s;}
.gen-dot:nth-child(3){animation-delay:.4s;}
@keyframes gd{0%,60%,100%{opacity:.2;transform:scale(1);}30%{opacity:1;transform:scale(1.3);}}

/* input */
.chat-input-area{flex-shrink:0;padding:12px 20px 16px;border-top:1px solid var(--border);}
.chat-input-wrap{background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;transition:border-color .15s;max-width:760px;margin:0 auto;}
.chat-input-wrap:focus-within{border-color:var(--blue);}
textarea.ci{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:var(--font);font-size:14px;color:var(--text);line-height:1.5;max-height:110px;min-height:21px;}
textarea.ci::placeholder{color:var(--text3);}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:var(--purple);}
.send-btn:active{transform:scale(.9);}
.send-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}

/* ═══════════════════════
   PAGE 2 — PASTEFY
═══════════════════════ */
#page2{align-items:center;justify-content:center;min-height:calc(100dvh - 56px);}
.pastefy-center{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;padding:40px 20px;}
.pf-icon{font-size:64px;}
.pf-title{font-size:24px;font-weight:800;letter-spacing:-.3px;}
.pf-desc{font-size:14px;color:var(--text2);max-width:340px;line-height:1.7;}
.pf-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:14px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;font-family:var(--font);font-size:15px;font-weight:700;
  text-decoration:none;transition:all .2s;
  box-shadow:0 6px 24px rgba(91,138,245,.35);
}
.pf-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(91,138,245,.5);}
.pf-btn:active{transform:scale(.97);}
.pf-note{font-size:11px;color:var(--text3);}

/* ═══════════════════════
   PAGE 3 — LOADSTRING
═══════════════════════ */
#page3{align-items:center;justify-content:center;min-height:calc(100dvh - 56px);}
.ls-wrap{width:100%;max-width:580px;padding:32px 20px;}
.ls-header{text-align:center;margin-bottom:28px;}
.ls-title{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;}
.ls-title span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ls-sub{font-size:13px;color:var(--text2);}

.ls-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.ls-card-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ls-dots{display:flex;gap:4px;}
.ls-dot{width:9px;height:9px;border-radius:50%;}
.ls-dot:nth-child(1){background:#f7614f;}.ls-dot:nth-child(2){background:#f7a94f;}.ls-dot:nth-child(3){background:#3dd68c;}
.ls-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;margin-left:4px;}

.ls-input-row{padding:14px 16px;display:flex;gap:9px;align-items:center;}
.ls-url-input{flex:1;height:42px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:11px;padding:0 13px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:border-color .15s;}
.ls-url-input::placeholder{color:var(--text3);font-family:var(--font);font-size:13px;}
.ls-url-input:focus{border-color:var(--blue);}
.ls-gen-btn{height:42px;padding:0 18px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 4px 14px rgba(91,138,245,.3);}
.ls-gen-btn:hover{transform:translateY(-1px);}
.ls-gen-btn:active{transform:scale(.96);}

.ls-result{display:none;margin-bottom:12px;}
.ls-result.show{display:block;}
.ls-result .ls-card-head{justify-content:space-between;}
.ls-ok-lbl{font-size:11px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:5px;}
.ls-copy-btn{padding:4px 12px;border-radius:7px;border:none;background:rgba(61,214,140,.1);color:var(--green);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.ls-copy-btn:hover{background:rgba(61,214,140,.2);}
.ls-copy-btn:active{transform:scale(.93);}
.ls-code{padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;word-break:break-all;white-space:pre-wrap;}
.ls-kw{color:#c792ea;}.ls-fn{color:#82aaff;}.ls-str{color:#c3e88d;}.ls-url{color:var(--orange);}

.ls-hint{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 15px;font-size:12px;color:var(--text2);line-height:1.8;}
.ls-hint strong{color:var(--text);}
.ls-hint code{font-family:var(--mono);color:var(--blue);font-size:11px;}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(10,10,16,.96);border:1px solid var(--border2);color:var(--text);border-radius:24px;padding:8px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">🎮 Roblox Tools</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchPage(1)">
      <div class="nav-tab-num">1</div>Script AI
    </div>
    <div class="nav-tab" onclick="switchPage(2)">
      <div class="nav-tab-num">2</div>Pastefy
    </div>
    <div class="nav-tab" onclick="switchPage(3)">
      <div class="nav-tab-num">3</div>Loadstring
    </div>
  </div>
</nav>

<!-- ══ PAGE 1: AI SCRIPT ══ -->
<div class="page active page-height" id="page1">
  <!-- 生成中オーバーレイ -->
  <div id="genScreen">
    <div class="gen-orb">🤖</div>
    <div class="gen-title">スクリプト生成中…</div>
    <div class="gen-sub">コードを書いています</div>
    <div class="gen-dots">
      <div class="gen-dot"></div>
      <div class="gen-dot"></div>
      <div class="gen-dot"></div>
    </div>
  </div>

  <div class="chat-wrap">
    <div class="msgs" id="msgs">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✍️</div>
        <div class="welcome-title">何を作りたいですか？</div>
        <div class="welcome-sub">要望を入力するとLocalScriptのコードを生成します</div>
        <div class="examples">
          <button class="ex-btn" onclick="useEx(this)">歩くスピードを上げる</button>
          <button class="ex-btn" onclick="useEx(this)">ジャンプ力を3倍にする</button>
          <button class="ex-btn" onclick="useEx(this)">プレイヤーのHPバー</button>
          <button class="ex-btn" onclick="useEx(this)">ランダムテレポート</button>
          <button class="ex-btn" onclick="useEx(this)">コイン収集システム</button>
          <button class="ex-btn" onclick="useEx(this)">キルカウンター表示</button>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea class="ci" id="ci" placeholder="例: 無限ジャンプできるスクリプト" rows="1"
          oninput="ar(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE 2: PASTEFY ══ -->
<div class="page" id="page2">
  <div class="pastefy-center">
    <div class="pf-icon">📋</div>
    <div class="pf-title">Pastefy</div>
    <div class="pf-desc">コードをPastefyにアップロードしてRaw URLを取得できます。アカウント登録で自動化も可能。</div>
    <a class="pf-btn" href="https://pastefy.app" target="_blank">
      Pastefy を開く →
    </a>
    <div class="pf-note">外部サイトに移動します</div>
  </div>
</div>

<!-- ══ PAGE 3: LOADSTRING ══ -->
<div class="page" id="page3">
  <div class="ls-wrap">
    <div class="ls-header">
      <div class="ls-title">Loadstring <span>Generator</span></div>
      <div class="ls-sub">Raw URLを入力するだけで自動生成</div>
    </div>

    <div class="ls-card">
      <div class="ls-card-head">
        <div class="ls-dots"><div class="ls-dot"></div><div class="ls-dot"></div><div class="ls-dot"></div></div>
        <span class="ls-lbl">RAW URL を入力</span>
      </div>
      <div class="ls-input-row">
        <input class="ls-url-input" id="lsInput" type="url"
          placeholder="https://raw.githubusercontent.com/..."
          oninput="lsGen()" onkeydown="if(event.key==='Enter')lsGen()">
        <button class="ls-gen-btn" onclick="lsGen()">⚡ 生成</button>
      </div>
    </div>

    <div class="ls-result" id="lsResult">
      <div class="ls-card">
        <div class="ls-card-head">
          <div class="ls-ok-lbl">✅ 生成完了</div>
          <button class="ls-copy-btn" onclick="lsCopy()">📋 コピー</button>
        </div>
        <div class="ls-code" id="lsCode"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════
// NAV
// ══════════════════
function switchPage(n){
  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active', i+1===n);
  });
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active', i+1===n);
  });
}

// ══════════════════
// PAGE 1 — AI
// ══════════════════
const SYS = `あなたはRobloxのLuaスクリプト専門AIです。
ユーザーの要望に応じてRoblox Studio用のLocalScriptコードのみを出力してください。

ルール:
- コードのみ出力。説明・解説・前置き・後書き・コメント一切不要
- コードは必ず\`\`\`lua ... \`\`\`で囲む
- Robloxの正しいAPIを使う
- 必ずLocalScript前提で書く`;

let busy = false;
let hist = [];

function ar(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

function useEx(el){
  document.getElementById('ci').value = el.textContent;
  ar(document.getElementById('ci'));
  send();
}

async function send(){
  const input = document.getElementById('ci');
  const text = input.value.trim();
  if(!text || busy) return;
  input.value = ''; ar(input);

  const w = document.getElementById('welcome');
  if(w) w.remove();

  addUser(text);
  hist.push({role:'user', content:text});

  busy = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('genScreen').classList.add('show');

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:SYS,
        messages:hist
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'エラーが発生しました';
    hist.push({role:'assistant', content:reply});
    document.getElementById('genScreen').classList.remove('show');
    addBot(reply);
  }catch(e){
    document.getElementById('genScreen').classList.remove('show');
    addBot('エラーが発生しました。もう一度お試しください。');
  }finally{
    busy = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function addUser(text){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-body"><div class="bubble user">${esc(text)}</div></div><div class="av user">👤</div>`;
  msgs.appendChild(row); sc();
}

function addBot(text){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row';

  const parts = parse(text);
  let html = '';
  parts.forEach(p=>{
    if(p.type==='text'){
      const t = esc(p.content).replace(/\n/g,'<br>').trim();
      if(t) html += `<div class="bubble bot">${t}</div>`;
    } else {
      const id = 'c'+Date.now()+Math.random().toString(36).slice(2);
      html += `<div class="code-wrap">
        <div class="code-head">
          <div class="code-label"><span></span>LocalScript</div>
          <button class="cp-btn" onclick="cpCode('${id}')">📋 コピー</button>
        </div>
        <pre class="code-body" id="${id}">${hl(p.content)}</pre>
      </div>`;
      setTimeout(()=>{ const e=document.getElementById(id); if(e) e.dataset.r=p.content; },0);
    }
  });

  row.innerHTML = `<div class="av bot">🤖</div><div class="msg-body" style="max-width:90%;flex:1">${html}</div>`;
  msgs.appendChild(row); sc();
}

function parse(text){
  const parts=[], re=/```(?:lua|luau)?\n?([\s\S]*?)```/g;
  let last=0, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) parts.push({type:'text',content:text.slice(last,m.index)});
    parts.push({type:'code',content:m[1].trim()});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',content:text.slice(last)});
  return parts;
}

function hl(code){
  return esc(code)
    .replace(/(--.*)$/gm,'<span class="cm">$1</span>')
    .replace(/\b(local|function|end|if|then|else|elseif|for|do|while|repeat|until|return|and|or|not|in|nil|true|false|break)\b/g,'<span class="ck">$1</span>')
    .replace(/(&quot;[^&]*&quot;)/g,'<span class="cs">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="cn">$1</span>')
    .replace(/\b(game|workspace|script|task|wait|Instance|Vector3|CFrame|UDim2|Color3|math|string|table|print|warn|error|require|Players|RunService|UserInputService|TweenService)\b/g,'<span class="cf">$1</span>');
}

function cpCode(id){
  const el=document.getElementById(id); if(!el) return;
  cp(el.dataset.r||el.textContent,'✅ コードをコピーしました');
}

function sc(){ const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }

// ══════════════════
// PAGE 3 — LOADSTRING
// ══════════════════
let lsRaw='';
function lsGen(){
  const url=document.getElementById('lsInput').value.trim();
  if(!url){ document.getElementById('lsResult').classList.remove('show'); return; }
  if(!url.startsWith('http')){ toast('正しいURLを入力してください'); return; }
  lsRaw=`loadstring(game:HttpGet("${url}"))()`;
  document.getElementById('lsCode').innerHTML=
    `<span class="ls-kw">loadstring</span>(<span class="ls-fn">game</span>:<span class="ls-fn">HttpGet</span>(<span class="ls-str">"</span><span class="ls-url">${esc(url)}</span><span class="ls-str">"</span>))()`;
  document.getElementById('lsResult').classList.add('show');
}
function lsCopy(){ cp(lsRaw,'✅ loadstringコードをコピーしました'); }

// ══════════════════
// UTILS
// ══════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cp(t,msg){
  if(!t) return;
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast(msg)); }
  else { const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast(msg); }
}

let tt;
function toast(msg){ const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200); }
</script>
